name: Deploy Docusaurus to GitHub Pages

on:
  push:
    branches:
      - fix-deploy-documentation
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: github-pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: yarn
          cache-dependency-path: documentation/yarn.lock

      - name: Enable Corepack
        run: corepack enable

      # Install npm package for component library and update package.json file to use that component library, instead of local library
      - name: Install npm package for js-ts-kit
        run: |
          cd documentation
          yarn add js-ts-kit

      - name: Install dependencies
        working-directory: documentation
        run: yarn install --immutable

      - name: Build website
        working-directory: documentation
        run: yarn build

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload build artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: documentation/build

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4